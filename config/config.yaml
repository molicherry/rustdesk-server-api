# RustDesk API Server Configuration
server:
  addr: "0.0.0.0:21114"
  mode: "release"  # debug | release

database:
  type: "sqlite"
  path: "./data/api.db"

jwt:
  key: ""
  expire_hours: 168  # 7 days

app:
  title: "RustDesk Admin"
  register: true
  captcha_threshold: 3  # 0 = disabled
  web_client: false

rustdesk:
  id_server: ""
  relay_server: ""
  api_server: ""
  key: ""
  key_file: "/data/id_ed25519.pub"

oidc:
  enable: false
  provider_url: ""
  client_id: ""
  client_secret: ""

ldap:
  enable: false
  url: ""
  base_dn: ""

smtp:
  enable: false
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""

log:
  level: "info"
  path: "./data/api.log"
