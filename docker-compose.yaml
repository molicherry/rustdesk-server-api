services:
  rustdesk-api:
    build: .
    container_name: rustdesk-api
    ports:
      - "21114:21114"   # REST API
      - "21115:21115"   # NAT type test (TCP)
      - "21116:21116"   # hbbs (TCP+UDP)
      - "21117:21117"   # hbbr
    volumes:
      - ./data:/data
    environment:
      - RUSTDESK_API_SERVER_MODE=release
      - RUSTDESK_API_JWT_KEY=${JWT_KEY:-}
      - RUSTDESK_API_LOG_LEVEL=info
      - RUSTDESK_API_APP_WEB_CLIENT=true
      # Set ADMIN_PASSWORD env var before first run. Required for initial admin creation.
      - RUSTDESK_API_ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:21114/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
